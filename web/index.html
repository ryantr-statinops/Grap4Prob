<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph4Prob | Visualizing & Simulating Probability</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-brand">
                <span class="nav-logo">🎲</span> <!-- thay ảnh logo vào đây-->
                <span class="nav-title"> Graph4Prob | Easy understand Probability Simulator</span>
            </div>
            <div class="nav-actions">
                <button class="nav-settings-btn" id="settingsBtn" title="Chuyển chế độ tối/sáng">
                    <!-- Moon icon (light mode) / Sun icon (dark mode) — swapped by JS -->
                    <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="app-container fade-in">
        <!-- Top Bar -->
        <header class="top-bar glass">
            <div class="bottom-row">
                <div class="module-selector-wrapper">
                    <select id="moduleSelect" class="module-select" required>
                        <option value="" disabled selected>-- Chọn kiểu mô phỏng --</option>
                        <option value="dice">🎲 Xúc xắc (Dice)</option>
                        <option value="coin">🪙 Đồng xu (Coin)</option>
                        <option value="card">🃏 Lá bài (Cards)</option>
                        <option value="urn">🎱 Rút bi (Urn)</option>
                        <option value="monty">🚪 Monty Hall</option>
                        <option value="birthday">🎂 Ngày sinh (Birthday)</option>
                        <option value="buffon">🪡 Kim Buffon (Pi)</option>
                        <option value="galton">🛝 Bàn Galton (CLT)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="numTrials" class="input-label">Số lần thử (n)</label>
                    <input type="number" id="numTrials" placeholder="Hãy nhập số lần thử" min="1" max="1000000">
                </div>
                <div id="dynamic-inputs" class="dynamic-inputs"></div>
                <button id="runBtn" class="btn-primary">▶ Bắt đầu mô phỏng</button>
                <div id="status-icon" class="dice-animation">🎲</div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <section class="hero-section glass">
                <h2 id="main-title">Mô phỏng Xúc xắc</h2>
                <p id="main-description">Luật số lớn phát biểu rằng khi số lần thử nghiệm tăng lên, tần suất thực nghiệm sẽ tiến dần đến xác suất lý thuyết.</p>
            </section>


            <div class="stats-grid" id="chartCard" style="display: none;">
                <section class="chart-card glass">
                    <h3 class="card-title">Phân phối tần suất hiện tại</h3>
                    <div class="chart-wrap">
                        <canvas id="mainChart"></canvas>
                    </div>
                </section>

                <section class="table-card glass">
                    <h3 class="card-title">Kết quả chi tiết</h3>
                    <div class="table-scroll">
                        <table id="resultTable">
                            <thead>
                                <tr id="table-head">
                                    <!-- Dynamic -->
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- Dynamic -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>

            <section id="convergenceCard" class="chart-card chart-card--short glass" style="display: none;">
                <h3 class="card-title">Đường hội tụ lũy tiến (Cumulative Average)</h3>
                <div class="chart-wrap">
                    <canvas id="convergenceChart"></canvas>
                </div>
            </section>


            <section id="aiSection" class="ai-panel glass" style="display: none;">
                <div class="ai-badge">🤖 AI INSIGHTS</div>
                <div id="aiContent">
                    <!-- Dynamic -->
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js?v=3.2"></script>
</body>
</html>
